# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_instructions:
    - path: "smartschool_mcp/server.py"
      instructions: |
        Review for:
        - MCP protocol compliance and FastMCP best practices
        - Correct use of the smartschool library (snake_case attributes, lazy _session())
        - All tool functions must have a top-level try/except returning {"error": "..."} or [{"error": "..."}]
        - No module-level code that connects to external services at import time
        - Type annotations must use built-in generics (list, dict, str | None) not typing.List/Dict/Optional

    - path: "smartschool_mcp/__main__.py"
      instructions: |
        Review for:
        - Correct ASGI middleware ordering (bearer auth must wrap CORS, not the other way around)
        - Lazy imports (uvicorn, starlette) inside _run_http to keep stdio startup fast
        - Environment variable fallbacks for all CLI flags

    - path: ".github/workflows/**"
      instructions: |
        Review for:
        - Pinned action versions (e.g. @v4 not @main)
        - Minimal required permissions (principle of least privilege)
        - Concurrency groups to prevent redundant runs
        - Use of uv for Python environment management

    - path: "tests/**"
      instructions: |
        Review for:
        - All tests must pass without real Smartschool credentials (use mock_session fixture)
        - Integration tests must be marked with @pytest.mark.integration
        - Cover error paths (not just happy paths)

    - path: "pyproject.toml"
      instructions: |
        Review for correct ruff/mypy/pytest configuration and consistent Python version constraints.

chat:
  auto_reply: true

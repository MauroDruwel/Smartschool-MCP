name: Release

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Build distribution ───────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Verify distribution
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 2. Publish to PyPI ──────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/smartschool-mcp
    permissions:
      id-token: write  # OIDC trusted publishing – no API key required
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  # ── 3. Publish to MCP Registry ──────────────────────────────────────────────
  publish-mcp:
    name: Publish to MCP Registry
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Stamp server.json with release version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          python - <<EOF
          import json, pathlib
          p = pathlib.Path("server.json")
          data = json.loads(p.read_text())
          data["version"] = "$VERSION"
          data["packages"][0]["version"] = "$VERSION"
          p.write_text(json.dumps(data, indent=2) + "\n")
          EOF

      - name: Install MCP Publisher
        run: |
          LATEST=$(curl -fsSL https://api.github.com/repos/modelcontextprotocol/registry/releases/latest \
            | grep '"tag_name"' | cut -d '"' -f 4)
          VERSION="${LATEST#v}"
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${LATEST}/mcp-publisher_${VERSION}_${OS}_${ARCH}.tar.gz" \
            | tar xz mcp-publisher

      - name: Authenticate with MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
